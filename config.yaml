baseURL: "https://blfzz.github.io/"

languageCode: en-us
title: "Abulfaz's website"

# Use Hugo modules to add theme
module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/flag-icon-css/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts

# Manage languages
# For any more details, you can check the official documentation: https://gohugo.io/content-management/multilingual/
languages:
  en:
    languageName: en
    weight: 1
  az:
    languageName: az
    weight: 2

# default language for the content
defaultContentLanguage: en  

# Force a locale to be use, really useful to develop the application ! Should be commented in production, the "weight" should rocks.
# DefaultContentLanguage: bn

# Allow raw html in markdown fileee
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

# At least HTML and JSON are required for the main HTML content and
# client-side JavaScript search
outputs:
  home:
  - HTML
  - RSS
  - JSON


# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  # Background image of the landing page
  background: /images/site/background.jpg
  #background: /images/site/Simulation.gif

  # Provide logos for your site. The inverted logo will be used in the initial
  # transparent navbar and the main logo will be used in the non-transparent navbar.
  # It will default to the theme logos if not provided.
  logo:
    main: /images/site/aze.png
    inverted: /images/site/aze.png
    favicon: /images/site/aze.png

  # GitHub repo of your site
  # gitRepo: https://github.com/blfzz/blfzz.github.io/
  # Default branch of your Git repo
  # gitBranch: gh-pages
  # Configure the number of section title visible in the top navbar
  topNavbar:
    maxVisibleSections: 6
  # Configure various features of this theme
  features:
    # Enable and configure portfolio
    portfolio:
      enable: true
    # Enable and configure blog posts
    blog:
      enable: true
      showAuthor: true
      shareButtons:
        facebook: true
        twitter: true
        linkedin: true
    comment:
      enable: false
      services:
        giscus:
          repo: your-repo/name
          repoID: your-repo-id
          category: your-category
          categoryID: your-category-id
          theme: light
          map: url
          reaction: 1
          metadata: 0
          inputPosition: bottom
          crossOrigin: anonymous
    # Enable & configure "Notes" features
    notes:
      enable: true
    # Enable dark theme
    darkMode:
      enable: true
    # specify whether you want to show Table of Contents in reading page
    toc: 
      enable: true
          # Show tags under the post title
    tags:
      enable: true
      on_card: true
          # Specify whether to show flag in the language selector. Default is true.
    flags:
      enable: true
      # # If you want to use different country flag for a language, specify them here.
      # flagOverwrites:
      #   - languageCode: en
      #     countryCode: us
    # Enable to use `video-player` shortcode
    videoPlayer:
      enable: true
            # Enable reading time support in post cards and in post pages
    readingTime:
      enable: true
    pagination:
       maxPostsPerPage: 12
    # Provide footer configuration.
  footer:
    enable: true
    # You can provide your custom footer template using this option.
    # Put your template in "layouts/partials" folder of your repo.
    template: footer.html
    # Show/hide navigation in the footer. Default is "true".
    navigation:
      enable: true
    # Show/hide "Contact Me" section in the footer. Default is "true".
    contactMe:
      enable: true
    # Show/hide credentials section in the footer. Default is "true".
    credentials:
      enable: false

    # Show/hide newsletter section in the footer. Default is "true".
    # This feature hasn't been implemented yet.
    # Currently, you can just hide it from the footer.
    newsletter:
      enable: false